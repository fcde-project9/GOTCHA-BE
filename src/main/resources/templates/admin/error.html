<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{admin/layout/default}">
<head>
    <title>오류</title>
</head>
<body>
<div layout:fragment="content">
    <div class="d-flex align-items-center justify-content-center" style="min-height: 400px;">
        <div class="text-center">
            <i class="bi bi-exclamation-triangle text-warning" style="font-size: 3rem;"></i>
            <h4 class="mt-3">오류가 발생했습니다</h4>
            <p class="text-muted" th:text="${errorMessage}">알 수 없는 오류</p>
            <p class="text-muted small" th:if="${errorCode}" th:text="'코드: ' + ${errorCode}"></p>
            <a th:href="@{/admin/dashboard}" class="btn btn-primary mt-3">대시보드로 돌아가기</a>
        </div>
    </div>
</div>
</body>
</html>
