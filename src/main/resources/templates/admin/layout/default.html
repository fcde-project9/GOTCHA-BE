<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title layout:title-pattern="$CONTENT_TITLE - GOTCHA Admin">GOTCHA Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link th:href="@{/admin/css/admin.css}" rel="stylesheet">
</head>
<body>
    <div class="d-flex">
        <div th:replace="~{admin/layout/fragments/sidebar :: sidebar}"></div>
        <div class="main-content flex-grow-1">
            <div th:replace="~{admin/layout/fragments/header :: header}"></div>
            <main class="p-4">
                <div layout:fragment="content"></div>
            </main>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/admin/js/admin.js}"></script>
    <div layout:fragment="scripts"></div>
</body>
</html>
