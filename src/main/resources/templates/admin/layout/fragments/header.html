<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>
<header th:fragment="header" class="admin-header d-flex justify-content-between align-items-center px-4 py-2 border-bottom bg-white">
    <h5 class="mb-0" th:text="${pageTitle ?: '관리자'}"></h5>
    <div class="d-flex align-items-center gap-3">
        <span class="text-muted" sec:authentication="name">admin</span>
        <form th:action="@{/admin/logout}" method="post" class="d-inline">
            <button type="submit" class="btn btn-outline-secondary btn-sm">로그아웃</button>
        </form>
    </div>
</header>
</body>
</html>
