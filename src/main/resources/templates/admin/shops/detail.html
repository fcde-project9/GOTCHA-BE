<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{admin/layout/default}">
<head>
    <title>매장 상세</title>
</head>
<body>
<div layout:fragment="content">
    <div class="row g-4">
        <div class="col-md-8">
            <div class="card shadow-sm">
                <div class="card-header bg-white py-3">
                    <h6 class="mb-0">매장 정보</h6>
                </div>
                <div class="card-body">
                    <div class="row mb-3">
                        <div class="col-md-3 text-muted">ID</div>
                        <div class="col-md-9" th:text="${shop.id}"></div>
                    </div>
                    <div class="row mb-3">
                        <div class="col-md-3 text-muted">매장명</div>
                        <div class="col-md-9" th:text="${shop.name}"></div>
                    </div>
                    <div class="row mb-3">
                        <div class="col-md-3 text-muted">주소</div>
                        <div class="col-md-9" th:text="${shop.addressName ?: '-'}"></div>
                    </div>
                    <div class="row mb-3">
                        <div class="col-md-3 text-muted">찾아가는 힌트</div>
                        <div class="col-md-9" th:text="${shop.locationHint ?: '-'}"></div>
                    </div>
                    <div class="row mb-3">
                        <div class="col-md-3 text-muted">좌표</div>
                        <div class="col-md-9" th:text="${shop.latitude + ', ' + shop.longitude}"></div>
                    </div>
                    <div class="row mb-3">
                        <div class="col-md-3 text-muted">대표 이미지</div>
                        <div class="col-md-9">
                            <img th:if="${shop.mainImageUrl}" th:src="${shop.mainImageUrl}"
                                 class="rounded" style="max-width: 200px; max-height: 150px; object-fit: cover;">
                            <span th:unless="${shop.mainImageUrl}" class="text-muted">없음</span>
                        </div>
                    </div>
                    <div class="row mb-3">
                        <div class="col-md-3 text-muted">등록자</div>
                        <div class="col-md-9">
                            <a th:if="${shop.createdBy}" th:href="@{/admin/users/{id}(id=${shop.createdBy.id})}"
                               th:text="${shop.createdBy.nickname}"></a>
                            <span th:unless="${shop.createdBy}" class="text-muted">비회원</span>
                        </div>
                    </div>
                    <div class="row mb-3">
                        <div class="col-md-3 text-muted">등록일</div>
                        <div class="col-md-9" th:text="${#temporals.format(shop.createdAt, 'yyyy-MM-dd HH:mm')}"></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card shadow-sm border-danger">
                <div class="card-header bg-white py-3">
                    <h6 class="mb-0 text-danger">위험 영역</h6>
                </div>
                <div class="card-body">
                    <p class="text-muted small">매장을 삭제하면 연관된 리뷰, 찜, 댓글, 제안 등 모든 데이터가 함께 삭제됩니다.</p>
                    <form th:action="@{/admin/shops/{id}/delete(id=${shop.id})}" method="post">
                        <button type="submit" class="btn btn-danger w-100"
                                data-confirm="정말로 이 매장을 삭제하시겠습니까? 모든 연관 데이터가 삭제됩니다.">매장 삭제</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <div class="mt-3">
        <a th:href="@{/admin/shops}" class="btn btn-outline-secondary btn-sm">목록으로</a>
    </div>
</div>
</body>
</html>
